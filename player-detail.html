<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>選手詳細 | Countpitch</title>

<style>
:root {
  --navy:#041e42;
  --red:#bf0d3e;
  --line:#d7dce3;
}

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:linear-gradient(135deg,#041e42 0%,#0b2447 34%,#f1f3f6 34%);
  color:#111827;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:16px;
}

.card {
  background:rgba(255,255,255,.96);
  border-radius:18px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 10px 24px rgba(4,30,66,.18);
}

.hero {
  background:linear-gradient(135deg,#111827,#041e42);
  color:white;
  border-radius:18px;
  padding:32px 24px;
  margin-bottom:18px;
}

.hero-name {
  font-size:34px;
  font-weight:900;
}

.hero-role {
  margin-top:8px;
  color:#d1d5db;
}

h2 {
  margin-top:0;
  color:var(--navy);
  border-left:8px solid var(--red);
  padding-left:10px;
  font-size:20px;
  font-weight:900;
}

.nav {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
}

.nav a {
  background:#041e42;
  color:white;
  text-decoration:none;
  text-align:center;
  padding:14px;
  border-radius:12px;
  font-weight:900;
}

.summary-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:12px;
}

.stat {
  background:linear-gradient(180deg,#fff,#eef2f7);
  border-radius:14px;
  padding:14px;
  text-align:center;
  border-top:5px solid var(--navy);
}

.stat-title {
  font-size:13px;
  color:#4b5563;
  font-weight:bold;
}

.stat-value {
  font-size:26px;
  font-weight:900;
  color:var(--navy);
}

.table-wrap {
  overflow-x:auto;
  border-radius:14px;
  border:1px solid var(--line);
}

table {
  border-collapse:collapse;
  width:100%;
  min-width:900px;
  background:white;
}

th {
  background:var(--navy);
  color:white;
}

th,td {
  border:1px solid var(--line);
  padding:9px;
  text-align:center;
  white-space:nowrap;
}

tr:nth-child(even) td {
  background:#f8fafc;
}

.history-item {
  background:#f8fafc;
  border-left:6px solid var(--red);
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
  font-weight:bold;
}

@media(max-width:700px) {
  .container { padding:10px; }
  .summary-grid { grid-template-columns:repeat(2,1fr); }
  .hero-name { font-size:28px; }
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <div class="nav">
      <a href="index.html">メインページへ戻る</a>
      <a href="players.html">選手名鑑へ戻る</a>
      <a href="record.html">投球記録ページへ</a>
    </div>
  </div>

  <div class="hero">
    <div class="hero-name" id="playerName">選手名</div>
    <div class="hero-role">投手</div>
  </div>

  <div class="card">
    <h2>通算成績</h2>
    <div class="summary-grid">
      <div class="stat"><div class="stat-title">登板数</div><div class="stat-value" id="gameCount">0</div></div>
      <div class="stat"><div class="stat-title">総投球数</div><div class="stat-value" id="totalPitch">0</div></div>
      <div class="stat"><div class="stat-title">直球</div><div class="stat-value" id="fastballPitch">0</div></div>
      <div class="stat"><div class="stat-title">変化球</div><div class="stat-value" id="breakingPitch">0</div></div>
      <div class="stat"><div class="stat-title">直球割合</div><div class="stat-value"><span id="fastballRate">0</span>%</div></div>
      <div class="stat"><div class="stat-title">変化球割合</div><div class="stat-value"><span id="breakingRate">0</span>%</div></div>
      <div class="stat"><div class="stat-title">ストライク率</div><div class="stat-value"><span id="strikeRate">0</span>%</div></div>
      <div class="stat"><div class="stat-title">空振り率</div><div class="stat-value"><span id="swingRate">0</span>%</div></div>
      <div class="stat"><div class="stat-title">被打率</div><div class="stat-value" id="battingAverage">0</div></div>
      <div class="stat"><div class="stat-title">三振</div><div class="stat-value" id="totalStrikeout">0</div></div>
      <div class="stat"><div class="stat-title">四球</div><div class="stat-value" id="totalWalk">0</div></div>
      <div class="stat"><div class="stat-title">K/BB</div><div class="stat-value" id="kbb">0</div></div>
    </div>
  </div>

  <div class="card">
    <h2>球種別 通算成績</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>球種</th>
            <th>投球数</th>
            <th>ストライク率</th>
            <th>空振り率</th>
            <th>被打率</th>
            <th>凡打</th>
            <th>安打</th>
          </tr>
        </thead>
        <tbody id="pitchTypeTable"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>登板履歴</h2>
    <div id="historyArea">登板履歴はありません。</div>
  </div>

  <div class="card">
    <h2>選択した登板の詳細</h2>
    <div id="gameDetailArea">登板履歴をクリックしてください。</div>
  </div>

</div>

<script>
const pitchTypes = {
  fastball: { name: "直球", group: "fastball" },
  slider: { name: "スライダー", group: "breaking" },
  curve: { name: "カーブ", group: "breaking" },
  fork: { name: "フォーク", group: "breaking" },
  changeup: { name: "チェンジアップ", group: "breaking" },
  cutter: { name: "カットボール", group: "breaking" },
  sinker: { name: "シンカー", group: "breaking" }
};

const pitchItems = ["called", "foul", "swing", "ball", "out", "hit"];

const params = new URLSearchParams(location.search);
const playerName = params.get("name");

let players = JSON.parse(localStorage.getItem("countpitchPlayers")) || {};

function createEmptyTotals() {
  const totals = {};

  for (const type in pitchTypes) {
    totals[type] = {};
    pitchItems.forEach(item => totals[type][item] = 0);
  }

  totals.results = { strikeout:0, walk:0 };
  return totals;
}

function aggregateGames(games) {
  const totals = createEmptyTotals();

  games.forEach(game => {
    for (const type in pitchTypes) {
      pitchItems.forEach(item => {
        totals[type][item] += game.counts?.[type]?.[item] || 0;
      });
    }

    for (let i = 1; i <= 9; i++) {
      totals.results.strikeout += game.inningCounts?.[i]?.strikeout || 0;
      totals.results.walk += game.inningCounts?.[i]?.walk || 0;
    }
  });

  return totals;
}

function sumType(totals, type) {
  return pitchItems.reduce((sum, item) => sum + totals[type][item], 0);
}

function sumGroup(totals, group) {
  let total = 0;
  for (const type in pitchTypes) {
    if (pitchTypes[type].group === group) {
      total += sumType(totals, type);
    }
  }
  return total;
}

function sumItem(totals, item, group = null) {
  let total = 0;
  for (const type in pitchTypes) {
    if (group === null || pitchTypes[type].group === group) {
      total += totals[type][item];
    }
  }
  return total;
}

function strikeCount(totals, group = null) {
  return (
    sumItem(totals, "called", group) +
    sumItem(totals, "foul", group) +
    sumItem(totals, "swing", group) +
    sumItem(totals, "out", group) +
    sumItem(totals, "hit", group)
  );
}

function battingAverage(totals, group = null, type = null) {
  let hit = 0;
  let out = 0;

  if (type) {
    hit = totals[type].hit;
    out = totals[type].out;
  } else {
    hit = sumItem(totals, "hit", group);
    out = sumItem(totals, "out", group);
  }

  const atBat = hit + out;
  return atBat === 0 ? "0" : (hit / atBat).toFixed(3);
}

function percent(num, den) {
  return den === 0 ? "0" : (num / den * 100).toFixed(1);
}

function getGamePitch(game) {
  let total = 0;
  for (const type in pitchTypes) {
    pitchItems.forEach(item => {
      total += game.counts?.[type]?.[item] || 0;
    });
  }
  return total;
}

function updateSummary(name, games, totals) {
  const fastballPitch = sumGroup(totals, "fastball");
  const breakingPitch = sumGroup(totals, "breaking");
  const totalPitch = fastballPitch + breakingPitch;
  const strikeout = totals.results.strikeout;
  const walk = totals.results.walk;

  document.getElementById("playerName").textContent = name;
  document.getElementById("gameCount").textContent = games.length;
  document.getElementById("totalPitch").textContent = totalPitch;
  document.getElementById("fastballPitch").textContent = fastballPitch;
  document.getElementById("breakingPitch").textContent = breakingPitch;
  document.getElementById("fastballRate").textContent = percent(fastballPitch, totalPitch);
  document.getElementById("breakingRate").textContent = percent(breakingPitch, totalPitch);
  document.getElementById("strikeRate").textContent = percent(strikeCount(totals), totalPitch);
  document.getElementById("swingRate").textContent = percent(sumItem(totals, "swing"), totalPitch);
  document.getElementById("battingAverage").textContent = battingAverage(totals);
  document.getElementById("totalStrikeout").textContent = strikeout;
  document.getElementById("totalWalk").textContent = walk;
  document.getElementById("kbb").textContent = walk === 0 ? strikeout : (strikeout / walk).toFixed(2);
}

function updatePitchTypeTable(totals) {
  const tbody = document.getElementById("pitchTypeTable");
  tbody.innerHTML = "";

  for (const type in pitchTypes) {
    const pitch = sumType(totals, type);
    const strike =
      totals[type].called +
      totals[type].foul +
      totals[type].swing +
      totals[type].out +
      totals[type].hit;

    tbody.innerHTML += `
      <tr>
        <td>${pitchTypes[type].name}</td>
        <td>${pitch}</td>
        <td>${percent(strike, pitch)}%</td>
        <td>${percent(totals[type].swing, pitch)}%</td>
        <td>${battingAverage(totals, null, type)}</td>
        <td>${totals[type].out}</td>
        <td>${totals[type].hit}</td>
      </tr>
    `;
  }
}

function updateHistory(games) {
  const area = document.getElementById("historyArea");

  if (games.length === 0) {
    area.innerHTML = "登板履歴はありません。";
    return;
  }

  area.innerHTML = "";

  games.forEach((game, index) => {
    area.innerHTML += `
      <div class="history-item" onclick="showGameDetail(${index})">
        ${escapeHtml(game.date)}<br>
        ${escapeHtml(game.title)}<br>
        ${getGamePitch(game)}球
      </div>
    `;
  });
}

function showGameDetail(index) {
  const game = players[playerName].games[index];
  const totals = aggregateGames([game]);
  const pitch = getGamePitch(game);

  document.getElementById("gameDetailArea").innerHTML = `
    <h3>${escapeHtml(game.title)}</h3>
    <p>${escapeHtml(game.date)}</p>
    <div class="summary-grid">
      <div class="stat"><div class="stat-title">投球数</div><div class="stat-value">${pitch}</div></div>
      <div class="stat"><div class="stat-title">ストライク率</div><div class="stat-value">${percent(strikeCount(totals), pitch)}%</div></div>
      <div class="stat"><div class="stat-title">空振り率</div><div class="stat-value">${percent(sumItem(totals, "swing"), pitch)}%</div></div>
      <div class="stat"><div class="stat-title">被打率</div><div class="stat-value">${battingAverage(totals)}</div></div>
    </div>
    <br>
    ${createInningTable(game)}
  `;
}

function createInningTable(game) {
  let html = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>回</th><th>球数</th><th>直球</th><th>変化球</th><th>ストライク</th><th>ボール</th>
            <th>見逃し</th><th>ファール</th><th>空振り</th><th>凡打</th><th>安打</th><th>三振</th><th>四球</th>
          </tr>
        </thead>
        <tbody>
  `;

  for (let i = 1; i <= 9; i++) {
    const d = game.inningCounts?.[i] || {};
    const called = d.called || 0;
    const foul = d.foul || 0;
    const swing = d.swing || 0;
    const out = d.out || 0;
    const hit = d.hit || 0;
    const ball = d.ball || 0;
    const strike = called + foul + swing + out + hit;
    const pitch = strike + ball;

    html += `
      <tr>
        <td>${i}回</td>
        <td>${pitch}</td>
        <td>${d.fastball || 0}</td>
        <td>${d.breaking || 0}</td>
        <td>${strike}</td>
        <td>${ball}</td>
        <td>${called}</td>
        <td>${foul}</td>
        <td>${swing}</td>
        <td>${out}</td>
        <td>${hit}</td>
        <td>${d.strikeout || 0}</td>
        <td>${d.walk || 0}</td>
      </tr>
    `;
  }

  html += `
        </tbody>
      </table>
    </div>
  `;

  return html;
}

function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function init() {
  if (!playerName || !players[playerName]) {
    document.getElementById("playerName").textContent = "選手が見つかりません";
    document.getElementById("historyArea").textContent = "players.html から選手を選択してください。";
    return;
  }

  const games = players[playerName].games || [];
  const totals = aggregateGames(games);

  updateSummary(playerName, games, totals);
  updatePitchTypeTable(totals);
  updateHistory(games);
}

init();
</script>

</body>
</html>
