<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countpitch</title>

<style>
:root {
  --navy:#041e42;
  --red:#bf0d3e;
  --bg:#f1f3f6;
}

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:linear-gradient(135deg,#041e42 0%,#0b2447 40%,#f1f3f6 40%);
  color:#111827;
  min-height:100vh;
}

header {
  background:#041e42;
  color:white;
  padding:24px;
  text-align:center;
  border-bottom:5px solid var(--red);
}

h1 {
  margin:0;
  font-size:34px;
  font-weight:900;
  letter-spacing:2px;
}

h1::before {
  content:"⚾ ";
}

.container {
  max-width:900px;
  margin:auto;
  padding:24px;
}

.hero {
  background:rgba(255,255,255,0.96);
  border-radius:22px;
  padding:28px;
  box-shadow:0 12px 28px rgba(4,30,66,0.25);
  margin-top:30px;
  text-align:center;
}

.hero-title {
  font-size:28px;
  font-weight:900;
  color:var(--navy);
  margin-bottom:10px;
}

.hero-text {
  font-size:16px;
  color:#4b5563;
  margin-bottom:24px;
}

.menu-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
}

.menu-card {
  display:block;
  text-decoration:none;
  color:white;
  border-radius:18px;
  padding:28px 18px;
  font-weight:900;
  box-shadow:0 6px 0 rgba(0,0,0,0.25);
}

.menu-card:active {
  transform:translateY(4px);
  box-shadow:0 2px 0 rgba(0,0,0,0.25);
}

.record {
  background:linear-gradient(#bf0d3e,#8a092d);
}

.players {
  background:linear-gradient(#041e42,#0b2447);
}

.menu-icon {
  font-size:42px;
  margin-bottom:10px;
}

.menu-title {
  font-size:22px;
  margin-bottom:8px;
}

.menu-desc {
  font-size:14px;
  opacity:0.9;
}

.footer {
  text-align:center;
  color:white;
  margin-top:30px;
  font-size:13px;
}

@media(max-width:700px) {
  h1 {
    font-size:26px;
  }

  .container {
    padding:14px;
  }

  .hero {
    padding:20px;
  }
}
</style>
</head>

<body>

<header>
  <h1>Countpitch</h1>
</header>

<div class="container">

  <div class="hero">
    <div class="hero-title">Pitching Data Manager</div>
    <div class="hero-text">
      投球記録・登板履歴・選手別通算成績を管理できます。
    </div>

    <div class="menu-grid">
      <a href="record.html" class="menu-card record">
        <div class="menu-icon">📋</div>
        <div class="menu-title">投球記録</div>
        <div class="menu-desc">
          登板ごとの球数、球種、結果を記録する
        </div>
      </a>

      <a href="players.html" class="menu-card players">
        <div class="menu-icon">👤</div>
        <div class="menu-title">選手名鑑</div>
        <div class="menu-desc">
          選手登録、通算成績、登板履歴を見る
        </div>
      </a>
    </div>
  </div>

  <div class="footer">
    Countpitch Baseball Analytics
  </div>

</div>

</body>
</html>
