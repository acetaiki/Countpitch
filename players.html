<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>選手名鑑 | Countpitch</title>

<style>
:root {
  --black:#050505;
  --dark:#151515;
  --orange:#f59e0b;
  --white:#ffffff;
  --gray:#f3f4f6;
  --line:#2a2a2a;
}

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:#ffffff;
  color:#111;
}

header {
  background:#050505;
  color:white;
  height:78px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:4px solid var(--orange);
  position:sticky;
  top:0;
  z-index:10;
}

.logo {
  font-size:30px;
  font-weight:900;
  letter-spacing:2px;
  color:var(--orange);
}

.logo::before {
  content:"⚾ ";
}

.container {
  max-width:1100px;
  margin:0 auto;
  padding:34px 16px;
}

.nav {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
  margin-bottom:32px;
}

.nav a {
  background:#050505;
  color:white;
  text-decoration:none;
  text-align:center;
  padding:14px;
  border-radius:4px;
  font-weight:900;
}

.register-box {
  border:1px solid #ccc;
  padding:18px;
  margin-bottom:34px;
}

h1 {
  text-align:center;
  font-size:26px;
  margin:40px 0 28px;
}

h2 {
  margin:0 0 14px;
  font-size:18px;
  border-left:6px solid var(--orange);
  padding-left:10px;
}

input {
  width:100%;
  box-sizing:border-box;
  padding:14px;
  font-size:18px;
  border:1px solid #aaa;
  margin-bottom:12px;
}

.button-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
}

button {
  border:none;
  padding:14px;
  font-weight:900;
  color:white;
  cursor:pointer;
  font-size:16px;
}

.add-btn {
  background:#b45309;
}

.delete-btn {
  background:#444;
}

.players-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  border-top:1px solid var(--line);
  border-left:1px solid var(--line);
}

.player-card {
  position:relative;
  min-height:170px;
  background:
    linear-gradient(135deg,rgba(255,255,255,0.05),rgba(0,0,0,0.3)),
    #1a1a1a;
  color:white;
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
  text-decoration:none;
  overflow:hidden;
  display:flex;
  align-items:center;
  padding:18px 18px 18px 128px;
}

.player-card::before {
  content:"";
  position:absolute;
  left:18px;
  bottom:0;
  width:90px;
  height:120px;
  background:
    radial-gradient(circle at 50% 28%, #f3f4f6 0 22px, transparent 23px),
    linear-gradient(#ffffff 0 100%);
  clip-path:polygon(28% 18%,72% 18%,88% 100%,12% 100%);
  opacity:.92;
}

.player-card::after {
  content:"";
  position:absolute;
  left:44px;
  top:34px;
  width:38px;
  height:38px;
  border-radius:50%;
  background:#d1d5db;
}

.player-card:hover {
  filter:brightness(1.15);
}

.player-info {
  position:relative;
  z-index:2;
}

.player-name {
  font-size:22px;
  font-weight:900;
  margin-bottom:6px;
}

.player-roman {
  font-size:11px;
  color:#9ca3af;
  margin-bottom:8px;
  text-transform:uppercase;
}

.player-role {
  font-size:13px;
  margin-bottom:10px;
}

.player-stats {
  font-size:12px;
  color:#d1d5db;
  line-height:1.6;
}

.player-number {
  position:absolute;
  right:24px;
  bottom:18px;
  font-size:56px;
  font-weight:900;
  color:transparent;
  -webkit-text-stroke:1.5px var(--orange);
  opacity:.9;
}

.empty {
  text-align:center;
  padding:40px;
  color:#666;
  border:1px solid #ddd;
}

@media(max-width:900px) {
  .players-grid {
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:600px) {
  .players-grid {
    grid-template-columns:1fr;
  }

  .player-card {
    min-height:150px;
    padding-left:120px;
  }

  .logo {
    font-size:24px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">COUNTPITCH</div>
</header>

<div class="container">

  <div class="nav">
    <a href="index.html">メインページ</a>
    <a href="record.html">投球記録</a>
  </div>

  <div class="register-box">
    <h2>選手登録</h2>
    <input id="playerNameInput" placeholder="選手名を入力">
    <div class="button-grid">
      <button class="add-btn" onclick="addPlayer()">選手登録</button>
      <button class="delete-btn" onclick="deleteAllPlayers()">全選手データ削除</button>
    </div>
  </div>

  <h1>投手</h1>

  <div id="playerList"></div>

</div>

<script>
let players = JSON.parse(localStorage.getItem("countpitchPlayers")) || {};

function savePlayers() {
  localStorage.setItem("countpitchPlayers", JSON.stringify(players));
}

function createPlayer() {
  return {
    games: []
  };
}

function addPlayer() {
  const input = document.getElementById("playerNameInput");
  const name = input.value.trim();

  if (!name) {
    alert("選手名を入力してください");
    return;
  }

  if (!players[name]) {
    players[name] = createPlayer();
  }

  input.value = "";
  savePlayers();
  renderPlayers();
}

function deleteAllPlayers() {
  if (!confirm("全選手データを削除しますか？")) return;
  players = {};
  savePlayers();
  renderPlayers();
}

function renderPlayers() {
  const area = document.getElementById("playerList");
  const names = Object.keys(players);

  if (names.length === 0) {
    area.innerHTML = '<div class="empty">登録選手がありません。</div>';
    return;
  }

  area.innerHTML = '<div class="players-grid"></div>';
  const grid = area.querySelector(".players-grid");

  names.forEach((name, index) => {
    const player = players[name];
    const games = player.games || [];
    const totalPitch = getTotalPitch(games);
    const strikeout = getTotalResult(games, "strikeout");
    const walk = getTotalResult(games, "walk");

    grid.innerHTML += `
      <a class="player-card" href="player-detail.html?name=${encodeURIComponent(name)}">
        <div class="player-info">
          <div class="player-name">${escapeHtml(name)}</div>
          <div class="player-roman">${toRomanText(name)}</div>
          <div class="player-role">投手</div>
          <div class="player-stats">
            登板数：${games.length}<br>
            総投球数：${totalPitch}<br>
            三振：${strikeout}　四球：${walk}
          </div>
        </div>
        <div class="player-number">${String(index + 1).padStart(2, "0")}</div>
      </a>
    `;
  });
}

function getTotalPitch(games) {
  let total = 0;
  const pitchItems = ["called", "foul", "swing", "ball", "out", "hit"];

  games.forEach(game => {
    if (!game.counts) return;

    for (const type in game.counts) {
      pitchItems.forEach(item => {
        total += game.counts[type][item] || 0;
      });
    }
  });

  return total;
}

function getTotalResult(games, resultType) {
  let total = 0;

  games.forEach(game => {
    for (let i = 1; i <= 9; i++) {
      total += game.inningCounts?.[i]?.[resultType] || 0;
    }
  });

  return total;
}

function toRomanText(name) {
  return name.replace(/[^\w\s]/g, "").toUpperCase() || "PITCHER";
}

function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

renderPlayers();
</script>

</body>
</html>
