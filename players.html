<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>選手名鑑 | Countpitch</title>

<style>
:root {
  --navy:#041e42;
  --red:#bf0d3e;
  --gold:#f59e0b;
  --line:#d7dce3;
}

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:#f1f3f6;
  color:#111827;
}

header {
  background:#041e42;
  color:white;
  padding:22px;
  text-align:center;
  border-bottom:5px solid var(--red);
}

h1 {
  margin:0;
  font-size:30px;
  font-weight:900;
  letter-spacing:2px;
}

h1::before {
  content:"⚾ ";
}

.container {
  max-width:1200px;
  margin:auto;
  padding:18px;
}

.card {
  background:white;
  border-radius:18px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 10px 24px rgba(4,30,66,0.16);
}

h2 {
  margin-top:0;
  color:var(--navy);
  border-left:8px solid var(--red);
  padding-left:10px;
  font-size:20px;
  font-weight:900;
}

input {
  width:100%;
  box-sizing:border-box;
  font-size:20px;
  padding:13px;
  border-radius:12px;
  border:2px solid var(--navy);
  font-weight:bold;
  margin-bottom:10px;
}

.button-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
}

button, .link-btn {
  border:none;
  border-radius:12px;
  padding:15px 10px;
  color:white;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  text-align:center;
  text-decoration:none;
  display:block;
}

.main-btn {
  background:linear-gradient(#bf0d3e,#8a092d);
}

.sub-btn {
  background:linear-gradient(#041e42,#0b2447);
}

.delete-btn {
  background:linear-gradient(#6b7280,#374151);
}

.players-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:0;
  border:1px solid #111827;
}

.player-card {
  position:relative;
  min-height:150px;
  background:linear-gradient(135deg,#1f2937,#111827);
  border:1px solid #111827;
  color:white;
  padding:18px;
  cursor:pointer;
  overflow:hidden;
  text-decoration:none;
  display:block;
}

.player-card:hover {
  filter:brightness(1.12);
}

.player-card::after {
  content:"";
  position:absolute;
  right:-30px;
  bottom:-30px;
  width:130px;
  height:130px;
  background:rgba(255,255,255,0.06);
  border-radius:50%;
}

.player-name {
  font-size:24px;
  font-weight:900;
  margin-bottom:6px;
  position:relative;
  z-index:1;
}

.player-role {
  font-size:14px;
  color:#d1d5db;
  position:relative;
  z-index:1;
}

.player-number {
  position:absolute;
  right:18px;
  bottom:12px;
  font-size:54px;
  font-weight:900;
  color:transparent;
  -webkit-text-stroke:1.5px var(--gold);
}

.player-stats {
  margin-top:18px;
  font-size:13px;
  color:#e5e7eb;
  position:relative;
  z-index:1;
  line-height:1.7;
}

.empty {
  padding:24px;
  background:white;
  border-radius:14px;
  text-align:center;
  color:#6b7280;
  font-weight:bold;
}

@media(max-width:700px) {
  h1 { font-size:24px; }
  .container { padding:10px; }
  .players-grid {
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>選手名鑑</h1>
</header>

<div class="container">

  <div class="card">
    <h2>ページ移動</h2>
    <div class="button-grid">
      <a href="index.html" class="link-btn sub-btn">メインページへ戻る</a>
      <a href="record.html" class="link-btn sub-btn">投球記録ページへ</a>
    </div>
  </div>

  <div class="card">
    <h2>選手登録</h2>
    <input id="playerNameInput" placeholder="選手名を入力">
    <div class="button-grid">
      <button class="main-btn" onclick="addPlayer()">選手登録</button>
      <button class="delete-btn" onclick="deleteAllPlayers()">全選手データ削除</button>
    </div>
  </div>

  <div class="card">
    <h2>登録選手一覧</h2>
    <div id="playerList"></div>
  </div>

</div>

<script>
let players = JSON.parse(localStorage.getItem("countpitchPlayers")) || {};

function savePlayers() {
  localStorage.setItem("countpitchPlayers", JSON.stringify(players));
}

function createPlayer() {
  return {
    games: []
  };
}

function addPlayer() {
  const input = document.getElementById("playerNameInput");
  const name = input.value.trim();

  if (!name) {
    alert("選手名を入力してください");
    return;
  }

  if (!players[name]) {
    players[name] = createPlayer();
  }

  input.value = "";
  savePlayers();
  renderPlayers();
}

function deleteAllPlayers() {
  if (!confirm("全選手データを削除しますか？")) return;

  players = {};
  savePlayers();
  renderPlayers();
}

function renderPlayers() {
  const area = document.getElementById("playerList");
  const names = Object.keys(players);

  if (names.length === 0) {
    area.innerHTML = '<div class="empty">登録選手がありません。</div>';
    return;
  }

  area.innerHTML = '<div class="players-grid"></div>';
  const grid = area.querySelector(".players-grid");

  names.forEach((name, index) => {
    const player = players[name];
    const games = player.games || [];
    const totalPitch = getTotalPitch(games);
    const strikeout = getTotalResult(games, "strikeout");
    const walk = getTotalResult(games, "walk");

    grid.innerHTML += `
      <a class="player-card" href="player-detail.html?name=${encodeURIComponent(name)}">
        <div class="player-name">${escapeHtml(name)}</div>
        <div class="player-role">投手</div>
        <div class="player-stats">
          登板数：${games.length}<br>
          総投球数：${totalPitch}<br>
          三振：${strikeout}　四球：${walk}
        </div>
        <div class="player-number">${String(index + 1).padStart(2, "0")}</div>
      </a>
    `;
  });
}

function getTotalPitch(games) {
  let total = 0;
  const pitchItems = ["called", "foul", "swing", "ball", "out", "hit"];

  games.forEach(game => {
    if (!game.counts) return;

    for (const type in game.counts) {
      pitchItems.forEach(item => {
        total += game.counts[type][item] || 0;
      });
    }
  });

  return total;
}

function getTotalResult(games, resultType) {
  let total = 0;

  games.forEach(game => {
    for (let i = 1; i <= 9; i++) {
      total += game.inningCounts?.[i]?.[resultType] || 0;
    }
  });

  return total;
}

function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

renderPlayers();
</script>

</body>
</html>
